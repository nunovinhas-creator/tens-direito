name: Pipeline Diário

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # ── Step 1: Scrape fontes ────────────────────────────────────────────────
      - name: Scrape fontes oficiais
        run: python scripts/scraper_playwright.py
        env:
          PYTHONUNBUFFERED: '1'

      # ── Step 2: Detectar mudanças ────────────────────────────────────────────
      - name: Detectar mudanças e registar
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const crypto = require('crypto');

            const scraped_dir = 'data/scraped';
            if (!fs.existsSync(scraped_dir)) return;

            const hoje = new Date().toISOString().slice(0, 10);
            const hora = new Date().toISOString().slice(11, 16);

            const fontes = {
              'seg_social_abono': 'https://www.seg-social.pt/abono-de-familia',
              'seg_social_rsi': 'https://www.seg-social.pt/rendimento-social-de-insercao',
              'dge_ase': 'https://www.dge.mec.pt',
              'dge_manuais': 'https://www.dge.mec.pt/manuais-escolares',
              'mega_datas': 'https://www.dge.mec.pt/manuais-escolares',
              'iefp_desemprego': 'https://www.iefp.pt/subsidio-desemprego',
            };

            const mudancas = [];

            for (const [slug, url] of Object.entries(fontes)) {
              const latest_path = path.join(scraped_dir, `${slug}_latest.json`);

              const files = fs.readdirSync(scraped_dir)
                .filter(f => f.startsWith(slug + '_') && f.includes(hoje) && !f.endsWith('_latest.json'))
                .sort().reverse();

              if (files.length === 0) {
                console.log(`${slug}: sem scrape de hoje`);
                continue;
              }

              const new_path = path.join(scraped_dir, files[0]);
              const new_content = fs.readFileSync(new_path, 'utf8');
              let new_data;
              try { new_data = JSON.parse(new_content); } catch(e) { continue; }

              if (!fs.existsSync(latest_path)) {
                fs.writeFileSync(latest_path, new_content);
                console.log(`${slug}: primeiro scrape guardado como latest`);
                continue;
              }

              const old_content = fs.readFileSync(latest_path, 'utf8');
              let old_data;
              try { old_data = JSON.parse(old_content); } catch(e) {
                fs.writeFileSync(latest_path, new_content);
                continue;
              }

              const hashOf = (d) => {
                const c = {...d};
                ['data_acesso','data_scrape','timestamp','data_run'].forEach(k => delete c[k]);
                return crypto.createHash('sha256').update(JSON.stringify(c, Object.keys(c).sort())).digest('hex');
              };

              const new_hash = new_data.hash_conteudo || hashOf(new_data);
              const old_hash = old_data.hash_conteudo || hashOf(old_data);

              if (new_hash === old_hash) {
                console.log(`${slug}: sem alterações`);
              } else {
                console.log(`${slug}: MUDANÇA DETECTADA`);
                mudancas.push({ slug, url, hoje, hora, new_data, old_data });
                fs.writeFileSync(latest_path, new_content);
              }
            }

            // Guardar lista de mudanças para step de Issues (mais tarde)
            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/mudancas.json', JSON.stringify(mudancas.map(m => ({
              slug: m.slug, url: m.url, data: m.hoje, hora: m.hora
            })), null, 2));
            console.log(`${mudancas.length} mudança(s) registada(s) em data/mudancas.json`);

      # ── Step 3: Notícias diárias ─────────────────────────────────────────────
      - name: Notícias diárias
        run: python scripts/gerar_noticias.py || echo "gerar_noticias.py falhou ou não existe — a continuar"
        env:
          PYTHONUNBUFFERED: '1'

      # ── Step 3b: Sanitizar noticias.html ─────────────────────────────────────
      - name: Sanitizar noticias.html
        run: |
          python3 << 'PYEOF'
          import re
          with open('noticias.html', 'r', encoding='utf-8') as f:
              conteudo = f.read()

          # Remover todas as formas de non-breaking space (incluindo dupla codificação)
          conteudo = conteudo.replace('&amp;nbsp;', ' ')
          conteudo = conteudo.replace('&nbsp;&nbsp;', ' ')
          conteudo = conteudo.replace('&nbsp;', ' ')
          conteudo = conteudo.replace('&#160;', ' ')
          conteudo = conteudo.replace('\xa0', ' ')

          # Limpar espaços múltiplos
          conteudo = re.sub(r'  +', ' ', conteudo)

          with open('noticias.html', 'w', encoding='utf-8') as f:
              f.write(conteudo)
          print('✓ noticias.html sanitizado')
          PYEOF

      # ── Step 4: Validar valores estruturados ────────────────────────────────
      - name: Validar valores estruturados
        run: python scripts/extrair_valores.py || echo "extrair_valores.py falhou — a continuar"
        env:
          PYTHONUNBUFFERED: '1'

      # ── Step 4b: Verificar datas sazonais ───────────────────────────────────
      - name: Verificar datas expiradas
        run: python3 scripts/verificar_datas.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Abrir Issues de datas expiradas
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let alertas = [];
            try {
              alertas = JSON.parse(fs.readFileSync('data/alertas_datas.json', 'utf8'));
            } catch(_) {}

            const hoje = new Date().toISOString().slice(0, 10);

            for (const a of alertas) {
              // Evitar duplicados: verificar se já existe issue com o mesmo título este ano
              const ano = new Date().getFullYear();
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'data-expirada',
              });
              const duplicate = existing.data.find(i => i.title === a.titulo);
              if (!duplicate) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: a.titulo,
                  body: a.corpo,
                  labels: ['data-expirada', 'verificar'],
                });
                console.log(`Issue criada: ${a.titulo}`);
              } else {
                console.log(`Issue já existe: ${a.titulo}`);
              }
            }
            console.log(`${alertas.length} alerta(s) processado(s)`);

      # ── Step 5: Actualizar README ────────────────────────────────────────────
      - name: Actualizar README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const hoje = new Date();
            const data_str = hoje.toLocaleDateString('pt-PT', {
              day: '2-digit', month: 'long', year: 'numeric', timeZone: 'Europe/Lisbon'
            });
            const hora_str = hoje.toLocaleTimeString('pt-PT', {
              hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Lisbon'
            });

            const listar = (dir, ext) => {
              try { return fs.readdirSync(dir).filter(f => !ext || f.endsWith(ext)).sort(); }
              catch(_) { return []; }
            };

            const htmls = fs.readdirSync('.').filter(f => f.endsWith('.html') && f !== '404.html').sort();
            const paginas_linhas = htmls.map(f => {
              let titulo = f.replace('.html', '');
              try {
                const m = fs.readFileSync(f, 'utf8').match(/<title>([^<]+)<\/title>/i);
                if (m) titulo = m[1].trim();
              } catch(_) {}
              return `| [\`${f}\`](${f}) | ${titulo} |`;
            });

            const workflows = listar('.github/workflows', '.yml');
            const agents   = listar('.claude/agents', '.md');
            const commands = listar('.claude/commands', '.md');
            const skills   = listar('.claude/skills', '.md');
            const scripts  = listar('scripts', '.py');

            const wf_info = {
              'pipeline-diario.yml': { cron: '`0 6 * * *` (diário 06:00 UTC)', fn: 'Pipeline único: scrape + detectar mudanças + notícias + validar + README + push' },
              'verificar-links.yml': { cron: '`0 7 * * 1` (segunda 07:00 UTC)', fn: 'lychee testa todos os links HTML + Issue se 404' },
              'validar-conteudo.yml': { cron: 'push para main (`**.html`)', fn: 'Valida GA4, OG tags, JSON-LD, disclaimer, data verificação + HTML5 validator' },
            };

            const wf_linhas = workflows.map(f => {
              const info = wf_info[f] || { cron: '—', fn: f.replace('.yml','') };
              return `| \`${f}\` | ${info.cron} | ${info.fn} |`;
            });

            const secao_estado = [
              '## ESTADO ATUAL',
              '',
              `Actualizado automaticamente a partir do repositório em **${data_str}**.`,
              '',
              '### Páginas publicadas',
              '',
              '| Ficheiro | Título |',
              '|---|---|',
              ...paginas_linhas,
            ].join('\n');

            const secao_arq = [
              '## 7. Arquitetura técnica',
              '',
              'Browser-only / mobile, Python, agentes Claude, deploy estático grátis (GitHub Pages).',
              '',
              '```',
              'tens-direito/',
              '├── README.md',
              '├── data/',
              '│   ├── apoios/',
              '│   ├── burocracia/',
              '│   └── scraped/            ← JSONs diários das fontes (gerados automaticamente)',
              '│       └── _fontes_config.json',
              '├── .github/',
              '│   └── workflows/',
              ...workflows.map(f => `│       ├── ${f}`),
              '├── .claude/',
              '│   ├── agents/',
              ...agents.map(f => `│   │   ├── ${f}`),
              '│   ├── commands/',
              ...commands.map(f => `│   │   ├── ${f}`),
              '│   └── skills/',
              ...skills.map(f => `│       ├── ${f}`),
              '├── scripts/',
              ...scripts.map(f => `│   ├── ${f}`),
              '└── *.html                  ← páginas estáticas publicadas',
              '```',
            ].join('\n');

            const secao_actions = [
              '## GitHub Actions',
              '',
              '> Stack 100% gratuito — sem serviços externos.',
              '> Apenas `pipeline-diario.yml` faz `git push`.',
              '',
              '| Workflow | Cron / Trigger | Função |',
              '|---|---|---|',
              ...wf_linhas,
              '',
              '**Labels de Issues automáticas:**',
              '- `fonte-alterada` — conteúdo de uma fonte mudou',
              '- `link-quebrado` — link com 404 confirmado',
              '- `verificar` — revisão pendente',
            ].join('\n');

            const secao_agentes = [
              '## Agentes disponíveis',
              '',
              '**Commands** (`.claude/commands/`) — invocar com `/nome-do-ficheiro`:',
              '',
              ...(commands.length ? commands.map(f => `- [\`/${f.replace('.md','')}\`](.claude/commands/${f})`) : ['- (nenhum)']),
              '',
              '**Skills** (`.claude/skills/`) — usadas internamente pelos commands:',
              '',
              ...(skills.length ? skills.map(f => `- [\`${f.replace('.md','')}\`](.claude/skills/${f})`) : ['- (nenhuma)']),
              '',
              '**Agents** (`.claude/agents/`) — agentes especializados:',
              '',
              ...(agents.length ? agents.map(f => `- [\`${f.replace('.md','')}\`](.claude/agents/${f})`) : ['- (nenhum)']),
            ].join('\n');

            let fontes_linhas = [];
            try {
              const cfg = JSON.parse(fs.readFileSync('data/scraped/_fontes_config.json', 'utf8'));
              for (const [slug, info] of Object.entries(cfg.fontes || {})) {
                const url = info.url_principal || '—';
                const status = info.status_bot ? (info.status_bot.includes('403') ? '⚠️ 403 esperado' : info.status_bot) : '✓';
                const verif = info.verificado_manualmente || '—';
                fontes_linhas.push(`| \`${slug}\` | ${url} | ${status} | ${verif} |`);
              }
            } catch(_) {}

            const secao_fontes_auto = fontes_linhas.length ? [
              '',
              '### Fontes monitorizadas',
              '',
              '| Slug | URL principal | Status (bot) | Verificado |',
              '|---|---|---|---|',
              ...fontes_linhas,
            ].join('\n') : '';

            const rodape = `---\n\n*Atualizado em ${data_str} às ${hora_str} · gerado automaticamente por \`pipeline-diario.yml\`*`;

            const substituir_secao = (texto, marca_inicio, marca_fim, novo_conteudo) => {
              const re = new RegExp(`(<!-- ${marca_inicio} -->)[\\s\\S]*?(<!-- ${marca_fim} -->)`, 'g');
              if (re.test(texto)) {
                return texto.replace(re, `<!-- ${marca_inicio} -->\n\n${novo_conteudo}\n\n<!-- ${marca_fim} -->`);
              }
              return texto + `\n\n<!-- ${marca_inicio} -->\n\n${novo_conteudo}\n\n<!-- ${marca_fim} -->`;
            };

            const substituir_heading = (texto, heading_re, novo_conteudo) => {
              const m = texto.match(heading_re);
              if (!m) return texto;
              const idx_start = texto.indexOf(m[0]);
              const nivel = m[0].match(/^(#+)/)[1];
              const re_next = new RegExp(`\\n${nivel}[^#]`, 'g');
              re_next.lastIndex = idx_start + m[0].length;
              const next = re_next.exec(texto);
              const idx_end = next ? next.index : texto.length;
              return texto.slice(0, idx_start) + novo_conteudo + '\n\n' + texto.slice(idx_end);
            };

            let readme = fs.readFileSync('README.md', 'utf8');
            readme = substituir_secao(readme, 'AUTO:ESTADO', 'END:ESTADO', secao_estado);
            readme = substituir_secao(readme, 'AUTO:ACTIONS', 'END:ACTIONS', secao_actions);
            readme = substituir_secao(readme, 'AUTO:AGENTES', 'END:AGENTES', secao_agentes);
            readme = substituir_secao(readme, 'AUTO:FONTES', 'END:FONTES', secao_fontes_auto);
            readme = substituir_heading(readme, /^## 7\. Arquitetura técnica[^\n]*/m, secao_arq);
            readme = substituir_secao(readme, 'AUTO:RODAPE', 'END:RODAPE', rodape);

            const readme_atual = fs.readFileSync('README.md', 'utf8');
            if (readme !== readme_atual) {
              fs.writeFileSync('README.md', readme);
              console.log('README actualizado.');
            } else {
              console.log('README sem alterações.');
            }

      # ── Step 6: Actualizar data de verificação no index.html ────────────────
      - name: Actualizar data de verificação no index.html
        run: |
          DATE_MES=$(python3 -c "
from datetime import datetime, timezone
meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro']
now = datetime.now(timezone.utc)
print(f'{meses[now.month-1]} {now.year}')
")
          DATE_FULL=$(date -u +%Y-%m-%d)
          sed -i "s|id=\"ultima-revisao-mes\">[^<]*<|id=\"ultima-revisao-mes\">${DATE_MES}<|g" index.html
          sed -i "s|\"dateModified\": \"[0-9-]*\"|\"dateModified\": \"${DATE_FULL}\"|g" index.html
          echo "Revisão atualizada: ${DATE_MES} (dateModified: ${DATE_FULL})"

      # ── Step 6a: Destaque sazonal no index.html ──────────────────────────────
      - name: Destaque sazonal
        run: |
          python3 << 'PYEOF'
          import json, re
          from datetime import datetime, timezone

          EVERGREEN = {
              'id': 'evergreen-fallback',
              'titulo': 'Descobre os apoios a que tens direito',
              'texto': 'Guias verificados com fonte oficial e data de actualização. Sem publicidade.',
              'cta_texto': 'Começa aqui →',
              'cta_url': '/comecar-aqui.html',
              'icone': '✅',
          }

          hoje = datetime.now(timezone.utc)
          mes  = hoje.month
          destaque = None
          avisos   = []

          # 1. Evento pontual (ativo == true)
          try:
              with open('data/destaque_evento.json', encoding='utf-8') as f:
                  ev = json.load(f).get('evento') or {}
              if ev.get('ativo') is True:
                  destaque = ev
                  print(f'Destaque: evento [{ev.get("id","?")}]')
              else:
                  print(f'Destaque: evento [{ev.get("id","?")}] inativo — a tentar sazonal')
          except FileNotFoundError:
              avisos.append('AVISO: data/destaque_evento.json não encontrado — a usar sazonal')
          except (json.JSONDecodeError, Exception) as e:
              avisos.append(f'AVISO: destaque_evento.json inválido ({e}) — a usar sazonal')

          # 2. Sazonal por mês
          if not destaque:
              try:
                  with open('data/destaques_sazonais.json', encoding='utf-8') as f:
                      sazonais = json.load(f).get('destaques') or []
                  if not isinstance(sazonais, list):
                      raise ValueError('campo "destaques" não é lista')
                  for s in sazonais:
                      if mes in (s.get('meses') or []):
                          destaque = s
                          print(f'Destaque: sazonal [{s.get("id","?")}] (mês {mes})')
                          break
                  if not destaque:
                      avisos.append(f'AVISO: mês {mes} não coberto em destaques_sazonais.json — a usar evergreen')
              except FileNotFoundError:
                  avisos.append('AVISO: data/destaques_sazonais.json não encontrado — a usar evergreen')
              except (json.JSONDecodeError, ValueError, Exception) as e:
                  avisos.append(f'AVISO: destaques_sazonais.json inválido ({e}) — a usar evergreen')

          # 3. Evergreen (nunca falha — hardcoded)
          if not destaque:
              destaque = EVERGREEN
              print('Destaque: evergreen (fallback de segurança)')

          for av in avisos:
              print(av)

          icone  = destaque.get('icone', '✅')
          titulo = destaque['titulo']
          texto  = destaque['texto']
          cta_t  = destaque['cta_texto']
          cta_u  = destaque['cta_url']

          bloco = (
              f'<span class="destaque-icone">{icone}</span>\n'
              f'    <div class="destaque-body">\n'
              f'      <strong class="destaque-titulo">{titulo}</strong>\n'
              f'      <span class="destaque-texto">{texto}</span>\n'
              f'    </div>\n'
              f'    <a href="{cta_u}" class="destaque-cta">{cta_t}</a>'
          )

          with open('index.html', encoding='utf-8') as f:
              html = f.read()

          novo = re.sub(
              r'<!-- DESTAQUE:INICIO -->[\s\S]*?<!-- DESTAQUE:FIM -->',
              (
                  '<!-- DESTAQUE:INICIO -->\n'
                  '  <div id="destaque-sazonal" class="destaque-banda">\n'
                  f'    {bloco}\n'
                  '  </div>\n'
                  '  <!-- DESTAQUE:FIM -->'
              ),
              html
          )

          if novo == html:
              print('AVISO: marcadores DESTAQUE:INICIO/FIM não encontrados em index.html — sem injecção')
          else:
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(novo)
              print(f'index.html: destaque injectado [{destaque.get("id","fallback")}]')
          PYEOF

      # ── Step 6b: Actualizar CLAUDE.md ───────────────────────────────────────
      - name: Actualizar CLAUDE.md
        run: |
          python3 - << 'PYEOF'
          import glob, re
          from datetime import datetime, timezone

          paginas = sorted(glob.glob("*.html"))
          paginas = [p for p in paginas if p not in
              ["404.html", "sobre.html", "fontes.html", "privacidade.html"]]

          with open("CLAUDE.md", encoding="utf-8") as f:
              conteudo = f.read()

          data = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          novo = re.sub(
              r"Última revisão automática: \d{4}-\d{2}-\d{2}",
              f"Última revisão automática: {data}",
              conteudo
          )

          if novo == conteudo:
              # Linha ainda não existe — adicionar antes do último newline
              novo = conteudo.rstrip() + f"\n\n---\n\n*Última revisão automática: {data}*\n"

          if novo != conteudo:
              with open("CLAUDE.md", "w", encoding="utf-8") as f:
                  f.write(novo)
              print(f"CLAUDE.md actualizado: {data}")
          else:
              print("CLAUDE.md sem alterações.")
          PYEOF

      # ── Step 6c: Guardrail — verificar ficheiros protegidos ─────────────────
      - name: Verificar ficheiros protegidos
        run: |
          python3 -c "
          import subprocess, sys
          AUTO_GERADOS = ['index.html', 'noticias.html', 'CLAUDE.md', 'README.md']
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'HEAD'],
              capture_output=True, text=True
          )
          modificados = [f.strip() for f in result.stdout.strip().split('\n') if f.strip()]
          violacoes = [f for f in modificados if f.endswith('.html') and f not in AUTO_GERADOS]
          if violacoes:
              print('ERRO CRITICO: ficheiros protegidos modificados pelo pipeline:')
              for f in violacoes:
                  print(f'  - {f}')
              print('Apenas index.html e noticias.html podem ser modificados automaticamente.')
              sys.exit(1)
          print(f'Guardrail OK — {len(modificados)} ficheiro(s) modificado(s), nenhum protegido afectado.')
          "

      # ── Step 7: Push único ───────────────────────────────────────────────────
      - name: Commit e push (único por dia)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html noticias.html README.md CLAUDE.md
          if git diff --staged --quiet; then
            echo "Sem alterações para commitar."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "auto: pipeline diário ${DATE}"
            git pull --rebase origin main
            git push
          fi

      # ── Step 8: Abrir Issues se mudanças ou divergências ────────────────────
      - name: Abrir Issues se mudanças detectadas
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const hoje = new Date().toISOString().slice(0, 10);
            const hora = new Date().toISOString().slice(11, 16);

            // Issues de mudanças de fontes
            let mudancas = [];
            try {
              mudancas = JSON.parse(fs.readFileSync('data/mudancas.json', 'utf8'));
            } catch(_) {}

            for (const m of mudancas) {
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'fonte-alterada',
              });
              const duplicate = existing.data.find(i => i.title.includes(m.slug) && i.title.includes(hoje));
              if (!duplicate) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `🔔 Mudança detectada: ${m.slug} (${hoje})`,
                  body: [
                    `## 🔔 Mudança detectada: \`${m.slug}\``,
                    ``,
                    `**Data/hora:** ${hoje} ${hora} UTC`,
                    `**Fonte:** ${m.url}`,
                    ``,
                    `### Acção necessária`,
                    `1. Verificar a fonte manualmente: ${m.url}`,
                    `2. Se os valores/condições mudaram: actualizar a página HTML correspondente`,
                    `3. Actualizar a data de verificação na página`,
                    `4. Fechar esta issue após correcção`,
                  ].join('\n'),
                  labels: ['fonte-alterada', 'verificar'],
                });
              }
            }

            // Issues de divergências de valores
            let divergencias = [];
            try {
              divergencias = JSON.parse(fs.readFileSync('data/divergencias.json', 'utf8'));
            } catch(_) {}

            if (divergencias.length > 0) {
              const linhas = divergencias.map(d =>
                `**${d.descricao}** (\`${d.campo}\`)\n- Fonte \`${d.slug_fonte}\`: \`${d.valor_fonte}\`\n- HTML \`${d.html_file}\`: \`${d.valor_publicado}\``
              ).join('\n\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ ${divergencias.length} divergência(s) de valores (${hoje})`,
                body: `Os valores nas fontes oficiais não coincidem com os publicados no site.\n\n${linhas}\n\nActualizar o HTML com o valor correcto e registar nova data de verificação.`,
                labels: ['fonte-alterada'],
              });
            }

            // Issue específica: datas MEGA 2026/2027 detectadas
            try {
              const avisos_txt = fs.readFileSync('data/scraped/avisos.log', 'utf8');
              if (avisos_txt.includes('mega_datas_publicadas:2026/2027')) {
                const existing = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  labels: 'verificar',
                });
                const duplicate = existing.data.find(i => i.title.includes('MEGA 2026/2027') && i.title.includes('datas'));
                if (!duplicate) {
                  // Extrair excertos do log
                  const match = avisos_txt.match(/mega_datas_publicadas:2026\/2027:([^\n]*)/);
                  const excertos = match ? match[1].trim() : '(ver data/scraped/mega_datas_latest.json)';
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: `📅 MEGA 2026/2027 — datas de emissão detectadas — actualizar manuais-escolares-mega.html`,
                    body: [
                      `## 📅 Datas MEGA 2026/2027 detectadas automaticamente`,
                      ``,
                      `**Data/hora:** ${hoje} ${hora} UTC`,
                      `**Fonte:** https://www.dge.mec.pt/manuais-escolares`,
                      ``,
                      `### Excertos detectados`,
                      `\`\`\``,
                      excertos,
                      `\`\`\``,
                      ``,
                      `### Acção necessária`,
                      `1. Confirmar as datas em https://manuaisescolares.pt`,
                      `2. Actualizar o calendário em \`manuais-escolares-mega.html\` com as datas reais`,
                      `3. Substituir "Final de julho / Início de agosto / Meados de agosto" pelas datas exactas`,
                      `4. Actualizar a data de verificação na página`,
                      `5. Fechar esta issue após actualização`,
                    ].join('\n'),
                    labels: ['verificar', 'fonte-alterada'],
                  });
                }
              }
            } catch(_) {}
