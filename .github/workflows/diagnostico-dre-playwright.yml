name: Diagnóstico DRE — Playwright vs HTTP simples

on:
  workflow_dispatch:

jobs:
  testar-dre-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Testar DRE deep link via Playwright
        run: |
          python3 - <<'EOF'
          import asyncio, re, unicodedata
          from playwright.async_api import async_playwright

          def texto_util(html):
              if not html:
                  return ""
              s = re.sub(r'<(script|style)\b.*?</\1>', ' ', html, flags=re.I|re.S)
              s = re.sub(r'<[^>]+>', ' ', s)
              return re.sub(r'\s+', ' ', s).strip()

          async def main():
              url = "https://diariodarepublica.pt/dr/legislacao-consolidada/lei/2019-124524843"
              print(f"URL: {url}")
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page()
                  try:
                      resp = await page.goto(url, wait_until="networkidle", timeout=30000)
                      status = resp.status if resp else 0
                      html = await page.content()
                      util = texto_util(html)
                      titulo_m = re.search(r'<title[^>]*>(.*?)</title>', html, re.I|re.S)
                      titulo = titulo_m.group(1).strip()[:120] if titulo_m else '(sem titulo)'
                      print(f"status_code: {status}")
                      print(f"url_final: {page.url}")
                      print(f"chars_uteis: {len(util)}")
                      print(f"titulo: {titulo}")
                      print(f"primeiros 500 chars uteis:\n{util[:500]}")
                      # Verificar se contem texto legislativo real
                      for kw in ["2019", "cuidador", "informal", "lei", "artigo", "537", "IAS"]:
                          if kw.lower() in util.lower():
                              print(f"  -> keyword encontrada: '{kw}'")
                  except Exception as e:
                      print(f"ERRO Playwright: {type(e).__name__}: {e}")
                      import sys; sys.exit(1)
                  finally:
                      await browser.close()

          asyncio.run(main())
          EOF

      - name: Testar Portaria IAS via Playwright (pesquisa DRE)
        run: |
          python3 - <<'EOF'
          import asyncio, re
          from playwright.async_api import async_playwright

          def texto_util(html):
              if not html:
                  return ""
              s = re.sub(r'<(script|style)\b.*?</\1>', ' ', html, flags=re.I|re.S)
              s = re.sub(r'<[^>]+>', ' ', s)
              return re.sub(r'\s+', ' ', s).strip()

          async def main():
              url = "https://diariodarepublica.pt/dr/pesquisa?q=480-A%2F2025"
              print(f"URL: {url}")
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page()
                  try:
                      resp = await page.goto(url, wait_until="networkidle", timeout=30000)
                      status = resp.status if resp else 0
                      html = await page.content()
                      util = texto_util(html)
                      titulo_m = re.search(r'<title[^>]*>(.*?)</title>', html, re.I|re.S)
                      titulo = titulo_m.group(1).strip()[:120] if titulo_m else '(sem titulo)'
                      print(f"status_code: {status}")
                      print(f"chars_uteis: {len(util)}")
                      print(f"titulo: {titulo}")
                      print(f"primeiros 500 chars uteis:\n{util[:500]}")
                      # Procurar links de resultados com ID numerico
                      ids = re.findall(r'/dr/detalhe/portaria/480-a-2025[-\w]*', html)
                      if ids:
                          print(f"deep links encontrados: {ids}")
                      else:
                          print("nenhum deep link /dr/detalhe/portaria/480-a-2025 encontrado")
                      # Procurar qualquer referencia a 480
                      refs = re.findall(r'480[^\s<"]{0,30}', util)
                      print(f"refs '480' no texto: {refs[:10]}")
                  except Exception as e:
                      print(f"ERRO Playwright: {type(e).__name__}: {e}")
                  finally:
                      await browser.close()

          asyncio.run(main())
          EOF
        continue-on-error: true
