name: Diagnóstico — Mapear API DRE (pesquisa funcional)

on:
  workflow_dispatch:

jobs:
  mapear-api:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Playwright
        run: pip install playwright && playwright install chromium

      - name: Mapear chamadas de rede DRE (página pesquisa real)
        run: |
          python3 - <<'EOF'
          import asyncio, re, json
          from playwright.async_api import async_playwright

          all_requests = []

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"
                  )

                  async def handle_response(response):
                      url = response.url
                      # Capturar apenas pedidos que não sejam recursos estáticos
                      if not any(url.endswith(ext) for ext in ('.js', '.css', '.png', '.svg', '.ico', '.woff', '.woff2')):
                          ct = response.headers.get("content-type", "")
                          all_requests.append({
                              "url": url,
                              "status": response.status,
                              "ct": ct[:60],
                          })

                  page.on("response", handle_response)

                  # Usar a página principal do DRE que sabemos funcionar
                  print("=== A carregar homepage DRE ===")
                  await page.goto("https://diariodarepublica.pt/dr/home", wait_until="networkidle", timeout=30000)
                  await asyncio.sleep(2)

                  print(f"Pedidos capturados da homepage: {len(all_requests)}")
                  for r in all_requests:
                      if "diariodarepublica.pt" in r["url"] and r["url"] != "https://diariodarepublica.pt/dr/home":
                          print(f"  [{r['status']}] {r['url'][:120]} ({r['ct']})")

                  # Agora tentar a pesquisa simples
                  all_requests.clear()
                  print("\n=== A tentar pesquisa via URL amigavel ===")
                  # Tentar com o URL que o scraper da Lei 100/2019 funcionou
                  url_test = "https://diariodarepublica.pt/dr/pesquisa"
                  resp = await page.goto(url_test, wait_until="networkidle", timeout=20000)
                  await asyncio.sleep(2)
                  print(f"status: {resp.status}")
                  corpo = await page.content()
                  util = re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', ' ', re.sub(r'<(script|style)\b.*?</\1>', ' ', corpo, flags=re.I|re.S))).strip()
                  print(f"chars: {len(util)}, preview: {util[:200]!r}")

                  print(f"\nPedidos da pesquisa: {len(all_requests)}")
                  for r in all_requests:
                      if "diariodarepublica.pt" in r["url"]:
                          print(f"  [{r['status']}] {r['url'][:120]} ({r['ct']})")

                  await browser.close()

          asyncio.run(main())
          EOF

      - name: Testar API REST DRE directamente (urllib)
        run: |
          python3 - <<'EOF'
          import urllib.request, json, re

          # Tentar endpoints de API conhecidos do Liferay (plataforma do DRE)
          # e outras hipóteses baseadas no padrão de URL do detalhe
          endpoints = [
              "https://diariodarepublica.pt/o/search/v1.0/search?q=portaria+71+2026&fields=classPK,title,description",
              "https://diariodarepublica.pt/api/jsonws/invoke",
              "https://diariodarepublica.pt/dr/api/legislacao?numero=71&tipo=portaria&ano=2026",
          ]

          for url in endpoints:
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0", "Accept": "application/json"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      body = r.read().decode("utf-8", errors="replace")
                      print(f"\nURL: {url}")
                      print(f"status: {r.status}, body[:300]: {body[:300]!r}")
              except Exception as e:
                  print(f"\nURL: {url}")
                  print(f"ERRO: {type(e).__name__}: {e}")
          EOF
