name: Notícias Diárias

on:
  schedule:
    - cron: '0 7 * * *'  # todos os dias às 07:00 UTC
  workflow_dispatch:       # permite correr manualmente

jobs:
  atualizar-noticias:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install feedparser requests

      - name: Gerar notícias
        run: python scripts/gerar_noticias.py

      - name: Commit e push se houver alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.html
          git diff --cached --quiet || git commit -m "auto: atualiza notícias $(date +%Y-%m-%d)"
          git push
