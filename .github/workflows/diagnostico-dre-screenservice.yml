name: Diagnóstico — DRE screenservice portaria 71/2026

on:
  workflow_dispatch:

jobs:
  interceptar-screenservice:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Playwright
        run: pip install playwright && playwright install chromium

      - name: Pesquisar portaria 71/2026 e interceptar screenservice
        run: |
          python3 - <<'EOF'
          import asyncio, re, json
          from playwright.async_api import async_playwright

          pesquisas_response = []

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"
                  )

                  async def handle_response(response):
                      url = response.url
                      if "DataActionGetPesquisas" in url and response.status == 200:
                          try:
                              body = await response.json()
                              pesquisas_response.append((url, body))
                              print(f"[CAPTURADO] {url}")
                          except Exception as e:
                              print(f"[ERRO parse] {e}")

                  page.on("response", handle_response)

                  # Navegar para a pesquisa do DRE
                  search_url = "https://diariodarepublica.pt/dr/pesquisa"
                  print(f"A carregar: {search_url}")
                  await page.goto(search_url, wait_until="networkidle", timeout=30000)
                  await asyncio.sleep(2)

                  # Tentar preencher a caixa de pesquisa e submeter
                  print("\nA tentar preencher caixa de pesquisa...")
                  try:
                      # Procurar input de pesquisa
                      inputs = await page.query_selector_all("input[type='text'], input[type='search'], input:not([type])")
                      print(f"Inputs encontrados: {len(inputs)}")
                      for i, inp in enumerate(inputs[:5]):
                          placeholder = await inp.get_attribute("placeholder") or ""
                          name = await inp.get_attribute("name") or ""
                          id_ = await inp.get_attribute("id") or ""
                          print(f"  input[{i}]: placeholder={placeholder!r} name={name!r} id={id_!r}")

                      # Tentar o primeiro input visível
                      if inputs:
                          await inputs[0].fill("portaria 71/2026")
                          await page.keyboard.press("Enter")
                          print("Submetido. A aguardar resultados...")
                          await asyncio.sleep(5)
                  except Exception as e:
                      print(f"Erro ao preencher: {e}")

                  print(f"\nRespostas DataActionGetPesquisas capturadas: {len(pesquisas_response)}")
                  for url, body in pesquisas_response:
                      print(f"\nURL: {url}")
                      s = json.dumps(body, ensure_ascii=False)
                      # Procurar referências a "71" ou "portaria" ou URLs /dr/detalhe/
                      if "71" in s or "portaria" in s.lower():
                          # Extrair URLs de detalhe
                          links = re.findall(r'/dr/detalhe/[^\s"\'\\]+', s)
                          print(f"Links /dr/detalhe/ na resposta: {links[:10]}")
                          # Mostrar fragmentos relevantes
                          for term in ["71", "portaria", "RSI", "rendimento"]:
                              idx = s.find(term)
                              if idx >= 0:
                                  print(f"Excerto '{term}': {s[max(0,idx-50):idx+100]!r}")
                                  break
                      else:
                          print(f"Body[:400]: {s[:400]!r}")

                  await browser.close()

          asyncio.run(main())
          EOF
