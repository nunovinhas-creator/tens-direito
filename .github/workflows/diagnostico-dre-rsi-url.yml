name: Diagnóstico DRE — URL Portaria 71/2026/1 v4

on:
  workflow_dispatch:

jobs:
  extrair-url:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Playwright
        run: pip install playwright && playwright install chromium

      - name: Extrair URL portaria 71/2026/1
        run: |
          python3 - <<'EOF'
          import asyncio, re, json
          from playwright.async_api import async_playwright

          raw_bodies = []

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  context = await browser.new_context(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36",
                      viewport={"width": 1280, "height": 900},
                  )
                  page = await context.new_page()

                  async def handle_response(response):
                      if "DataActionGetPesquisas" in response.url and response.status == 200:
                          try:
                              text = await response.text()
                              raw_bodies.append(text)
                              print(f"[API] Capturada resposta {len(raw_bodies)}, {len(text)} chars")
                          except Exception as e:
                              print(f"[ERRO] {e}")

                  page.on("response", handle_response)

                  await page.goto(
                      "https://diariodarepublica.pt/dr/pesquisa",
                      wait_until="networkidle",
                      timeout=45000,
                  )
                  await asyncio.sleep(2)

                  await page.evaluate("""
                      const inp = document.querySelector('#b2-b10-Input_Search');
                      if (inp) { inp.click(); inp.focus(); }
                  """)
                  await asyncio.sleep(0.5)
                  await page.keyboard.type("Portaria 71/2026/1", delay=50)
                  await asyncio.sleep(1)
                  await page.keyboard.press("Enter")
                  await asyncio.sleep(6)

                  print(f"Total respostas API: {len(raw_bodies)}")

                  # Processar a resposta de pesquisa (2a resposta — a 1a é o load inicial)
                  for i, body in enumerate(raw_bodies):
                      print(f"\n=== Resposta {i+1} ({len(body)} chars) ===")

                      # Procurar "71/2026" (sem aspas) no corpo
                      idx = body.find("71/2026")
                      if idx >= 0:
                          print(f">> Encontrou '71/2026' em pos {idx}")
                          snippet = body[max(0, idx-500):idx+1000]
                          print(f"Contexto bruto:\n{snippet}")

                          # Tentar extrair o dbId/fileId da estrutura JSON
                          # A estrutura é: "dbId":NNNN, "fileId":NNNN, "numero":"71/2026/1"
                          db_ids = re.findall(r'"dbId"\s*:\\*\s*(\d+)', snippet)
                          file_ids = re.findall(r'"fileId"\s*:\\*\s*(\d+)', snippet)
                          numeros = re.findall(r'"numero"\s*:\\*\s*\\"([^"\\]+)\\"', snippet)
                          numeros2 = re.findall(r'"numero":"([^"]+)"', snippet)
                          print(f"dbIds: {db_ids}")
                          print(f"fileIds: {file_ids}")
                          print(f"numeros (escaped): {numeros}")
                          print(f"numeros (direct): {numeros2}")

                          # Tentar desserializar o Resultado para extrair o URL
                          try:
                              outer = json.loads(body)
                              resultado_str = outer.get("data", {}).get("Resultado", "")
                              inner = json.loads(resultado_str)
                              hits = inner.get("hits", {}).get("hits", [])
                              for hit in hits:
                                  src = hit.get("_source", {})
                                  numero = src.get("numero", "")
                                  if "71" in numero and "2026" in numero:
                                      db_id = src.get("dbId")
                                      file_id = src.get("fileId")
                                      tipo = src.get("tipo", "portaria")
                                      print(f"\n=== MATCH ENCONTRADO ===")
                                      print(f"numero: {numero}")
                                      print(f"dbId: {db_id}")
                                      print(f"fileId: {file_id}")
                                      print(f"tipo: {tipo}")
                                      # URL provável:
                                      slug = tipo.lower().replace(" ", "-")
                                      print(f"URL candidato: https://diariodarepublica.pt/dr/detalhe/{slug}/71-2026-{db_id}")
                          except Exception as e:
                              print(f"Parse JSON falhou: {e}")
                      else:
                          print(f"'71/2026' nao encontrado. Primeiros 500 chars:")
                          print(body[:500])

                  await browser.close()

          asyncio.run(main())
          EOF
