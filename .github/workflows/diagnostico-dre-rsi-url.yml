name: Diagnóstico DRE — URL Portaria 71/2026/1 (RSI)

on:
  workflow_dispatch:

jobs:
  extrair-url:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Playwright
        run: pip install playwright && playwright install chromium

      - name: Extrair URL portaria 71/2026/1
        run: |
          python3 - <<'EOF'
          import asyncio, re, json
          from playwright.async_api import async_playwright

          raw_bodies = []

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"
                  )

                  async def handle_response(response):
                      if "DataActionGetPesquisas" in response.url and response.status == 200:
                          try:
                              text = await response.text()
                              raw_bodies.append(text)
                          except Exception as e:
                              print(f"[ERRO] {e}")

                  page.on("response", handle_response)

                  # Navegar para a pesquisa com o termo na URL
                  await page.goto(
                      "https://diariodarepublica.pt/dr/pesquisa/-/search/details/portaria+71/2026/1",
                      wait_until="domcontentloaded",
                      timeout=30000
                  )
                  await asyncio.sleep(3)

                  # Tentar aceitar cookie consent se presente
                  for sel in ['button[id*="accept"]', 'button[class*="accept"]', '#accept-cookies', '.cookie-accept']:
                      try:
                          btn = await page.query_selector(sel)
                          if btn:
                              await btn.click()
                              await asyncio.sleep(1)
                              break
                      except:
                          pass

                  await asyncio.sleep(3)

                  print(f"URL final: {page.url}")
                  print(f"Respostas API capturadas: {len(raw_bodies)}")

                  for i, body in enumerate(raw_bodies):
                      print(f"\n--- Resposta {i+1} (primeiros 2000 chars) ---")
                      print(body[:2000])
                      print(f"--- Fim resposta {i+1} ---")

                      for pattern in ['"71/2026"', '71-2026', '71\\/2026', 'numero":"71']:
                          idx = body.find(pattern)
                          if idx >= 0:
                              print(f"\nEncontrou {pattern!r} em posição {idx}")
                              snippet = body[max(0, idx-300):idx+700]
                              print(f"Contexto: {repr(snippet)}")

                              file_ids = re.findall(r'"fileId"\s*:\s*(\d+)', snippet)
                              ids = re.findall(r'"Id"\s*:\s*(\d+)', snippet)
                              links = re.findall(r'detalhe[^\s"\'\\]+', snippet)
                              print(f"fileIds: {file_ids}")
                              print(f"Ids: {ids}")
                              print(f"links detalhe: {links}")
                              break

                  # Também tentar pesquisa via UI com selectors alternativos
                  if not raw_bodies:
                      print("\n--- Tentativa via UI ---")
                      await page.goto("https://diariodarepublica.pt/dr/pesquisa", wait_until="domcontentloaded", timeout=30000)
                      await asyncio.sleep(5)

                      # Listar todos os inputs visíveis
                      inputs = await page.query_selector_all("input")
                      print(f"Inputs encontrados: {len(inputs)}")
                      for inp in inputs:
                          visible = await inp.is_visible()
                          id_attr = await inp.get_attribute("id")
                          type_attr = await inp.get_attribute("type")
                          print(f"  input id={id_attr!r} type={type_attr!r} visible={visible}")

                  await browser.close()

          asyncio.run(main())
          EOF
