name: Diagnóstico DRE — deep link vs RSS

on:
  workflow_dispatch:

jobs:
  testar-dre:
    runs-on: ubuntu-latest
    steps:
      - name: Testar DRE deep link (Lei 100/2019 consolidada)
        run: |
          python3 - <<'EOF'
          import urllib.request, re, unicodedata

          def texto_util(html):
              if not html:
                  return ""
              s = re.sub(r'<(script|style)\b.*?</\1>', ' ', html, flags=re.I|re.S)
              s = re.sub(r'<[^>]+>', ' ', s)
              return re.sub(r'\s+', ' ', s).strip()

          url = "https://diariodarepublica.pt/dr/legislacao-consolidada/lei/2019-124524843"
          print(f"URL: {url}")
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  status = r.status
                  corpo = r.read().decode("utf-8", errors="replace")
                  util = texto_util(corpo)
                  print(f"status_code: {status}")
                  print(f"chars_uteis: {len(util)}")
                  print(f"titulo: {re.search(r'<title[^>]*>(.*?)</title>', corpo, re.I|re.S).group(1).strip()[:120] if re.search(r'<title[^>]*>(.*?)</title>', corpo, re.I|re.S) else '(sem titulo)'}")
                  print(f"primeiros 300 chars uteis: {util[:300]}")
          except Exception as e:
              print(f"ERRO: {type(e).__name__}: {e}")
              import sys; sys.exit(1)
          EOF

      - name: Testar DRE RSS Série I (referência — sabemos que bloqueia)
        run: |
          python3 - <<'EOF'
          import urllib.request, re

          def texto_util(html):
              if not html:
                  return ""
              s = re.sub(r'<(script|style)\b.*?</\1>', ' ', html, flags=re.I|re.S)
              s = re.sub(r'<[^>]+>', ' ', s)
              return re.sub(r'\s+', ' ', s).strip()

          url = "https://dre.pt/rss/dr1s.rss"
          print(f"URL: {url}")
          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  status = r.status
                  corpo = r.read().decode("utf-8", errors="replace")
                  util = texto_util(corpo)
                  print(f"status_code: {status}")
                  print(f"chars_uteis: {len(util)}")
          except Exception as e:
              print(f"ERRO: {type(e).__name__}: {e}")
          EOF
        continue-on-error: true
