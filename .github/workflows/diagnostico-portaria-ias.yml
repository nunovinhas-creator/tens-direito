name: Diagnóstico Playwright — Portaria IAS 480-A/2025

on:
  workflow_dispatch:

jobs:
  testar-portaria:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Playwright
        run: pip install playwright && playwright install chromium

      - name: Testar portaria via Playwright
        run: |
          python3 - <<'EOF'
          import asyncio, re
          from playwright.async_api import async_playwright

          def texto_util(html):
              if not html:
                  return ""
              s = re.sub(r'<(script|style)\b.*?</\1>', ' ', html, flags=re.I|re.S)
              s = re.sub(r'<[^>]+>', ' ', s)
              return re.sub(r'\s+', ' ', s).strip()

          async def main():
              url = "https://diariodarepublica.pt/dr/detalhe/portaria/480-a-2025-993056222"
              print(f"URL: {url}")
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36")
                  resp = await page.goto(url, wait_until="networkidle", timeout=30000)
                  status = resp.status
                  corpo = await page.content()
                  util = texto_util(corpo)
                  print(f"status_code: {status}")
                  print(f"chars_uteis: {len(util)}")
                  titulo = re.search(r'<title[^>]*>(.*?)</title>', corpo, re.I|re.S)
                  print(f"titulo: {titulo.group(1).strip()[:120] if titulo else '(sem titulo)'}")
                  tem_ias = "IAS" in util or "indexante" in util.lower()
                  tem_valor = "537,13" in util or "537.13" in util
                  print(f"contem_IAS: {tem_ias}")
                  print(f"contem_537_13: {tem_valor}")
                  # Mostrar excerto à volta do valor se existir
                  idx = util.find("537")
                  if idx >= 0:
                      print(f"excerto_537: {util[max(0,idx-100):idx+100]!r}")
                  else:
                      print(f"primeiros_500: {util[:500]!r}")
                  await browser.close()

          asyncio.run(main())
          EOF
