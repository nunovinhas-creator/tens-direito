name: Diagnóstico — API DRE Portaria RSI 71/2026

on:
  workflow_dispatch:

jobs:
  encontrar-id:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Playwright
        run: pip install playwright && playwright install chromium

      - name: Interceptar chamadas API DRE para Portaria 71/2026
        run: |
          python3 - <<'EOF'
          import asyncio, re, json
          from playwright.async_api import async_playwright

          api_responses = []

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"
                  )

                  # Interceptar respostas de API JSON
                  async def handle_response(response):
                      url = response.url
                      if ("api" in url or "search" in url or "legisla" in url.lower()) and response.status == 200:
                          try:
                              ct = response.headers.get("content-type", "")
                              if "json" in ct:
                                  body = await response.json()
                                  api_responses.append((url, body))
                          except Exception:
                              pass

                  page.on("response", handle_response)

                  # Pesquisa DRE pela portaria
                  search_url = "https://diariodarepublica.pt/dr/pesquisa/-/search/details/portaria+71%2F2026%2F1"
                  print(f"A carregar: {search_url}")
                  await page.goto(search_url, wait_until="networkidle", timeout=30000)

                  # Aguardar um extra para API calls assíncronas
                  await asyncio.sleep(3)

                  print(f"\nAPI responses capturadas: {len(api_responses)}")
                  for url, body in api_responses[:10]:
                      print(f"\nURL: {url}")
                      s = json.dumps(body, ensure_ascii=False)[:500]
                      print(f"Body (500 chars): {s}")

                  # Também extrair qualquer link /dr/detalhe/ do HTML renderizado
                  corpo = await page.content()
                  links = re.findall(r'/dr/detalhe/[^\s"\'<>]+', corpo)
                  print(f"\nLinks /dr/detalhe/ no HTML: {links[:20]}")

                  # Procurar qualquer referência a 71/2026 no texto
                  util = re.sub(r'<[^>]+>', ' ', re.sub(r'<(script|style)\b.*?</\1>', ' ', corpo, flags=re.I|re.S))
                  util = re.sub(r'\s+', ' ', util).strip()
                  idx = util.find("71/2026")
                  if idx >= 0:
                      print(f"\nExcerto 71/2026: {util[max(0,idx-100):idx+200]!r}")
                  else:
                      idx2 = util.find("71-2026")
                      if idx2 >= 0:
                          print(f"\nExcerto 71-2026: {util[max(0,idx2-100):idx2+200]!r}")
                      else:
                          print(f"\nNão encontrou '71/2026' nem '71-2026' no texto")
                          print(f"Primeiros 300 chars: {util[:300]!r}")

                  await browser.close()

          asyncio.run(main())
          EOF
