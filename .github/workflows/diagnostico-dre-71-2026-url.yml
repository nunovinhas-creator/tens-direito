name: Diagnóstico — URL exacto portaria 71/2026

on:
  workflow_dispatch:

jobs:
  extrair-url:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Playwright
        run: pip install playwright && playwright install chromium

      - name: Extrair URL e fileId portaria 71/2026
        run: |
          python3 - <<'EOF'
          import asyncio, re, json
          from playwright.async_api import async_playwright

          raw_bodies = []

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(
                      user_agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36"
                  )

                  async def handle_response(response):
                      if "DataActionGetPesquisas" in response.url and response.status == 200:
                          try:
                              text = await response.text()
                              raw_bodies.append(text)
                          except Exception as e:
                              print(f"[ERRO] {e}")

                  page.on("response", handle_response)

                  await page.goto("https://diariodarepublica.pt/dr/pesquisa", wait_until="networkidle", timeout=30000)
                  await asyncio.sleep(1)

                  # Preencher campo de pesquisa e submeter
                  inp = await page.query_selector("#b2-b10-Input_Search")
                  if inp:
                      await inp.fill("Portaria 71/2026/1")
                      await page.keyboard.press("Enter")
                      await asyncio.sleep(6)
                  else:
                      print("Input não encontrado")

                  print(f"Respostas capturadas: {len(raw_bodies)}")

                  for i, body in enumerate(raw_bodies):
                      print(f"\n--- Resposta {i+1} ---")
                      # Procurar "71/2026" ou "71-2026" no raw text
                      for pattern in ['"71/2026"', '71-2026', '71\\/2026']:
                          idx = body.find(pattern)
                          if idx >= 0:
                              print(f"Encontrou {pattern!r} em posição {idx}")
                              # Extrair 500 chars antes e depois
                              snippet = body[max(0, idx-200):idx+500]
                              print(f"Contexto: {snippet!r}")

                              # Tentar extrair fileId e URL
                              file_ids = re.findall(r'"fileId"\s*:\s*(\d+)', snippet)
                              doc_ids = re.findall(r'"id"\s*:\s*"([^"]+)"', snippet)
                              urls = re.findall(r'\\+/dr\\+/detalhe\\+/[^"\\]+', snippet)
                              urls2 = re.findall(r'/dr/detalhe/[^\s"\'\\]+', snippet)
                              print(f"fileIds: {file_ids}")
                              print(f"ids: {doc_ids[:5]}")
                              print(f"urls escaped: {urls[:5]}")
                              print(f"urls directo: {urls2[:5]}")
                              break

                  await browser.close()

          asyncio.run(main())
          EOF
